url: https://bbuchsbaum.github.io/eigencore/
destination: pkgdown_site
template:
  bootstrap: 5
  light-switch: yes
  bslib:
    primary: '#0054AD'
    border-radius: 0.5rem
    btn-border-radius: 0.25rem
  package: albersdown
home:
  title: eigencore — Certified Partial Spectral Computation in R
  description: |
    Partial eigenvalue and singular-value computation in R with result certificates and inspectable solver plans.
navbar:
  structure:
    left:
    - intro
    - articles
    - reference
    - news
    right:
    - search
    - lightswitch
    - github
reference:
- title: User entry points
  desc: High-level functions for partial eigenvalue and SVD computation.
  contents:
  - eig_partial
  - eig_full
  - svd_partial
  - generalized_schur
  - generalized_svd
- title: RSpectra-compatible shims
  desc: Drop-in replacements for `RSpectra::eigs()`, `eigs_sym()`, and `svds()`.
  contents:
  - eigs
  - eigs_sym
  - svds
- title: Problems and planning
  desc: Build problem descriptors and inspect the solver plan.
  contents:
  - eigen_problem
  - svd_problem
  - plan_solver
  - solve.eigencore_eigen_problem
  - solve.eigencore_svd_problem
- title: Operators
  desc: Block-native linear operators and operator algebra.
  contents:
  - linear_operator
  - as_operator
  - adjoint
  - check_adjoint
  - compose
  - crossprod_operator
  - symmetric_operator
  - scale_cols
  - scale_rows
  - center
- title: Targets
  desc: Selectors describing which part of the spectrum you want.
  contents:
  - largest
  - smallest
  - largest_magnitude
  - smallest_magnitude
  - largest_real
  - smallest_real
  - largest_imaginary
  - smallest_imaginary
  - both_ends
  - nearest
- title: Methods
  desc: Solver families and method descriptors.
  contents:
  - auto
  - lanczos
  - lobpcg
  - golub_kahan
  - randomized
  - shift_invert
- title: Preconditioners
  desc: Preconditioner factories for iterative solvers.
  contents:
  - shifted_cholesky_preconditioner
  - shifted_diagonal_preconditioner
  - shifted_tridiagonal_preconditioner
- title: Spaces and structure tags
  contents:
  - euclidean
  - hermitian
  - general
- title: Results, certificates, diagnostics
  desc: Inspecting solver output and the numerical evidence.
  contents:
  - certificate
  - residuals
  - backward_error
  - values
  - alpha_beta
  - vectors
  - left_vectors
  - right_vectors
  - diagnostics
articles:
- title: Get started
  navbar: ~
  contents:
  - eigencore
  - certificates
  - generalized-eigenproblems
  - benchmarks
